<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Yuanzou Gao - Home</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            body {
                background-image: url("images/home.JPG");
                background-repeat: no-repeat;
                background-position: center;
                background-attachment: fixed;
                background-size: cover;
                height: 100vh;
                margin: 0;
            }

            h1 {
                margin: 0.1rem;
                color: #333;
            }

            a:link, a:visited {
                color: #333;
                text-decoration: none;
                font-weight: 600;
                border: 2px solid #333;
                padding: 0.5rem 1.5rem;
                border-radius: 30px;
                display: inline-block;
                transition: all 0.3s ease;
            }

            a:hover, a:active {
                color: #fff;
                background-color: #333;
                text-decoration: none;
            }

            @media (prefers-color-scheme: dark) {
                h1 {
                    color: #e0e0e0;
                }
                a:link, a:visited {
                    color: #e0e0e0;
                    border: 2px solid #e0e0e0;
                }
                a:hover, a:active {
                    color: #121212;
                    background-color: #e0e0e0;
                }
            }
        </style>
    </head>

    <body>
        <main>
            <div class="center-container">
                <div class="a"><h1>Yuanzou Gao</h1></div>
                <div class="b"><h1>高源邹</h1></div>

                <div class="c"><p><a href="about.html">About Me</a></p></div>
                <div class="d"><p><a href="contact.html">Contact</a></p></div>
                <div class="e"><p><a href="resume.html">Resume</a></p></div>  
            </div>
        </main>
    </body>
</html>
