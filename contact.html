<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            button {
                font-size: 1em;
            }
            main ul {
                padding: 2rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #ffffff;
                max-width: 500px;
                margin: 0 auto 2rem auto;
                border-radius: 20px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
                box-sizing: border-box;
            }
            main li {
                margin: 0.8em 0;
                list-style: none;
                font-size: 1.1em;
            }
            main li a {
                color: #007bff;
                text-decoration: none;
            }
            main li a:hover {
                text-decoration: underline;
            }
            #linkedinLogo, #githubLogo {
                text-decoration: none;
                margin: 0 15px;
                display: inline-block;
                transition: transform 0.3s ease;
            }
            #linkedinLogo:hover, #githubLogo:hover {
                transform: scale(1.1);
            }
            @media (prefers-color-scheme: dark) {
                main ul {
                    background: #1e1e1e;
                    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                }
                main li a {
                    color: #66b2ff;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="resume.html">Resume</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <ul>
                <li><strong>Email:</strong><a href="mailto:yg2630@nyu.edu">yg2630@nyu.edu</a></li>
                <li><strong>Wechat:</strong> Cassie__Gem</li>
                <li>
                    <a href="https://www.linkedin.com/in/yuanzougao/" id="linkedinLogo">
                        <img src="images/linkedin-icon.png" width="20" height=auto alt="LinkedIn icon">
                    </a>
                    <a href="https://github.com/yuanzou0?tab=repositories" id="githubLogo">
                        <img src="images/github-icon.png" width="20" height=auto alt="Github icon">
                    </a>
                </li>
            </ul>

            <form action="https://formspree.io/f/xanyvzqe" method="post">
                <label>
                    Your name: <input type="text" name="name" required>
                </label>
                <label>
                    Your email: <input type="email" name="email" required>
                </label>
                <label>
                    Your message: <textarea name="message" rows="6" placeholder="Write me a message!"></textarea>
                </label>
                <button type="submit">Send</button>
                <button type="reset" id="resetForm">Reset</button>
            </form>
        </main>

        <footer>
            <p>© 2026 Yuanzou Gao</p>
        </footer>
